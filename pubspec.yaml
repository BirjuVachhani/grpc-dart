name: grpc
version: 4.0.2-wip
description: Dart implementation of gRPC, a high performance, open-source universal RPC framework.
repository: https://github.com/grpc/grpc-dart

topics:
  - grpc
  - protocols
  - rpc

environment:
  sdk: ^3.5.0

dependencies:
  async: ">=2.7.0 <3.0.0"
  crypto: ">=3.0.0 <4.0.0"
  fixnum: ^1.1.1
  googleapis_auth: ^1.6.0
  meta: ">=1.3.0 <2.0.0"
  http: '>=0.13.0 <2.0.0'
  http2: ^2.3.1
  protobuf: '>=2.0.0 <4.0.0'
  clock: ^1.1.2
  web: ">=1.1.0 <2.0.0"

dev_dependencies:
  build_runner: ^2.4.15
  build_test: ^2.2.3
  lints: ^5.1.1
  mockito: ^5.4.5
  path: ">=1.9.0 <2.0.0"
  test: ^1.25.15
  stream_channel: ^2.1.4
  stream_transform: ^2.1.1
  vm_service: ">=11.6.0 <16.0.0"
  fake_async: ^1.3.3

false_secrets:
  - interop/server1.key
  - test/data/localhost.key
